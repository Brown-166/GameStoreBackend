<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${produto.id == null} ? 'GameStore — Novo Jogo' : 'GameStore — Editar Jogo'">GameStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f3f0e9;
            --surface:   #faf8f4;
            --ink:       #1a1714;
            --ink-mid:   #5c5850;
            --ink-muted: #a09a90;
            --gold:      #b07d2a;
            --border:    #ddd8ce;
            --border-md: #c5bfb5;
            --err-bg:    #fdf1f0;
            --err-ink:   #7c1f1f;
            --err-border:#f0c0be;
        }

        :root[data-theme="dark"] {
            --bg:        #15130f;
            --surface:   #1e1b16;
            --ink:       #f2ede4;
            --ink-mid:   #c9c0b2;
            --ink-muted: #8a8175;
            --gold:      #d99b3c;
            --border:    #332d24;
            --border-md: #453d31;
            --err-bg:    #2c1616;
            --err-ink:   #f0a8a5;
            --err-border:#4a2626;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            transition: background 0.2s, color 0.2s;
        }

        /* barra de navegação */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--ink);
            text-decoration: none;
        }

        .brand span { color: var(--gold); }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--ink-muted);
            font-size: 0.82rem;
            font-weight: 500;
            transition: color 0.15s;
        }

        .back-link:hover { color: var(--gold); }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-theme {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--ink-mid);
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-theme:hover { border-color: var(--gold); color: var(--gold); }

        .btn-theme .icon-moon { display: none; }
        :root[data-theme="dark"] .btn-theme .icon-sun  { display: none; }
        :root[data-theme="dark"] .btn-theme .icon-moon { display: inline-block; }

        /* mensagens de erro de validação */
        .field-error {
            margin-top: 6px;
            font-size: 0.78rem;
            color: var(--err-ink);
        }

        .field input.has-error {
            border-color: var(--err-border);
            background: var(--err-bg);
        }

        .form-outer {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 56px 40px 80px;
        }

        .form-inner {
            width: 100%;
            max-width: 480px;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 32px;
            color: var(--ink);
        }

        /* campos do formulario */
        .field { margin-bottom: 24px; }

        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--ink-mid);
            margin-bottom: 7px;
        }

        .field input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--ink);
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
            -moz-appearance: textfield;
        }

        .field input::-webkit-outer-spin-button,
        .field input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .field input::placeholder { color: var(--border-md); }

        .field input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(176, 125, 42, 0.15);
        }

        /* botoes salvar e cancelar */
        .actions {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 32px;
        }

        .btn-save {
            background: var(--ink);
            color: var(--bg);
            border: none;
            font-family: 'Outfit', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 11px 28px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.18s;
        }

        .btn-save:hover { background: var(--gold); }

        .btn-cancel {
            text-decoration: none;
            color: var(--ink-muted);
            font-size: 0.88rem;
            transition: color 0.15s;
        }

        .btn-cancel:hover { color: var(--ink); }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 0.75rem;
            color: var(--ink-muted);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* responsivo pra celular */
        @media (max-width: 640px) {
            nav, footer   { padding-left: 20px; padding-right: 20px; }
            .form-outer   { padding: 36px 20px 60px; }
        }
    </style>
    <script>
        // Aplica o tema salvo antes da renderização, evitando "flash" de tela clara
        (function () {
            if (localStorage.getItem('gamestore-theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>

<nav>
    <a href="/produtos" class="brand">Game<span>Store</span></a>
    <div class="nav-actions">
        <button type="button" class="btn-theme" onclick="toggleTheme()" title="Alternar tema" aria-label="Alternar tema claro/escuro">
            <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <a href="/produtos" class="back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Voltar ao catálogo
        </a>
    </div>
</nav>

<div class="form-outer">
    <div class="form-inner">

        <h1 class="form-title" th:text="${produto.id == null} ? 'Cadastrar novo jogo' : 'Editar jogo'">
            Cadastrar novo jogo
        </h1>

        <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="field">
                <label for="nome">Nome do Jogo</label>
                <input type="text" id="nome" th:field="*{nome}"
                       th:classappend="${#fields.hasErrors('nome')} ? 'has-error'"
                       placeholder="Ex: The Legend of Zelda" autocomplete="off">
                <div class="field-error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro no nome</div>
            </div>

            <div class="field">
                <label for="plataforma">Plataforma</label>
                <input type="text" id="plataforma" th:field="*{plataforma}"
                       th:classappend="${#fields.hasErrors('plataforma')} ? 'has-error'"
                       placeholder="PC, PlayStation 5, Xbox Series X..." autocomplete="off">
                <div class="field-error" th:if="${#fields.hasErrors('plataforma')}" th:errors="*{plataforma}">Erro na plataforma</div>
            </div>

            <div class="field">
                <label for="genero">Gênero</label>
                <input type="text" id="genero" th:field="*{genero}"
                       th:classappend="${#fields.hasErrors('genero')} ? 'has-error'"
                       placeholder="RPG, FPS, Aventura, Plataforma..." autocomplete="off">
                <div class="field-error" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}">Erro no gênero</div>
            </div>

            <div class="field">
                <label for="preco">Preço (R$)</label>
                <input type="number" id="preco" step="0.01" min="0"
                       th:field="*{preco}"
                       th:classappend="${#fields.hasErrors('preco')} ? 'has-error'"
                       placeholder="0,00">
                <div class="field-error" th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}">Erro no preço</div>
            </div>

            <div class="actions">
                <button type="submit" class="btn-save">Salvar</button>
                <a href="/produtos" class="btn-cancel">Cancelar</a>
            </div>
        </form>

    </div>
</div>

<footer>GameStore &middot; Sistema Acadêmico de Catálogo de Jogos Digitais</footer>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        if (isDark) {
            html.removeAttribute('data-theme');
            localStorage.setItem('gamestore-theme', 'light');
        } else {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('gamestore-theme', 'dark');
        }
    }
</script>

</body>
</html>
